# MaiBot Official QQ Adapter - Configuration Example
# Copy this file to config/config.toml and fill in your credentials.

[qq]
# QQ Official Bot App ID (from https://bot.q.qq.com/)
app_id = "YOUR_APP_ID"
# QQ Official Bot App Secret (client secret)
app_secret = "YOUR_APP_SECRET"

# Intent flags – set to true to receive the corresponding event type.
# public_guild_messages: AT_MESSAGE_CREATE (公域频道 @ 消息)
# public_messages:       GROUP_AT_MESSAGE_CREATE + C2C_MESSAGE_CREATE (群/C2C 消息)
# direct_message:        DIRECT_MESSAGE_CREATE (频道私信)
# guild_messages:        MESSAGE_CREATE (私域频道全量消息，需私域权限)
[qq.intents]
public_guild_messages = true
public_messages       = true
direct_message        = true
guild_messages        = false

[maibot]
# WebSocket URL of MaiBot's maim_message server.
# Default port is 8080; adjust if you changed MaiBot's HOST/PORT.
server_url = "ws://localhost:8080/ws"
# Optional authentication token (set in MaiBot's maim_message config).
# Leave empty if MaiBot does not require a token.
token = ""

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# Optional log file path (leave empty to log to stdout only)
log_file = "logs/adapter.log"